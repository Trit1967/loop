name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy
        run: |
          cd /opt/claude-terminal
          git fetch origin master
          git reset --hard origin/master
          systemctl restart claude-terminal
          echo "Deployed $(git rev-parse --short HEAD)"
