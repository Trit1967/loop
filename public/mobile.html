<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>Loop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Self-hosted DejaVu Mono for box-drawing chars — Android falls back to
       NotoSansSymbols (not monospaced) for U+2500+ which breaks all alignment */
    @font-face {
      font-family: 'DejaVuMono';
      src: url('/fonts/DejaVuSansMono.woff2') format('woff2');
      font-display: swap;
      unicode-range: U+2500-U+257F, U+2580-U+259F, U+25A0-U+25FF,
                     U+2800-U+28FF, U+2300-U+23FF;
    }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0f1117;
      --bg2:   #171b26;
      --bg3:   #1e2235;
      --text:  #e8e6e0;
      --dim:   #6b6966;
      --teal:  #4db8c2;
      --rose:  #c75878;
      --sage:  #5cb87a;
      --gold:  #c9a040;
      --mono:  'JetBrains Mono', 'DejaVuMono', 'DejaVu Sans Mono', 'Liberation Mono', 'Courier New', monospace;
      --ui:    'Space Grotesk', system-ui, sans-serif;
    }

    html, body {
      height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--ui);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── Header ─────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      min-height: 44px;
    }

    #logo {
      font-size: 15px;
      font-weight: 600;
      color: var(--teal);
      letter-spacing: -0.3px;
      flex-shrink: 0;
    }

    #session-selector {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      min-width: 0;
    }

    #state-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--dim); flex-shrink: 0;
      transition: background 0.3s;
    }
    #state-dot.active  { background: var(--sage); }
    #state-dot.waiting { background: var(--gold); animation: blink 1s ease-in-out infinite; }
    #state-dot.idle    { background: var(--dim); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    #session-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #session-name.placeholder { color: var(--dim); font-weight: 400; }

    #session-arrow { font-size: 10px; color: var(--dim); flex-shrink: 0; }

    #conn-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--sage); flex-shrink: 0;
      transition: background 0.3s;
    }
    #conn-dot.err { background: var(--rose); }

    /* ── Session picker overlay ──────────────────────────── */
    #picker {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: flex-end;
      display: none;
    }
    #picker-sheet {
      background: var(--bg2);
      border-radius: 16px 16px 0 0;
      padding: 8px 0 calc(env(safe-area-inset-bottom, 0px) + 12px);
      width: 100%;
    }
    #picker-title {
      font-size: 12px; color: var(--dim); font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 10px 18px 6px;
    }
    .picker-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 18px; cursor: pointer;
      font-size: 15px;
    }
    .picker-item:active { background: rgba(255,255,255,0.05); }
    .picker-item.active-session { color: var(--teal); }
    .picker-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Terminal output ─────────────────────────────────── */
    #terminal {
      flex: 1;
      overflow-x: auto;
      overflow-y: auto;
      padding: 10px 14px 6px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.45;
      color: var(--text);
      background: var(--bg);
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      /* pre: preserve tmux column alignment; no wrapping breaks box-drawing */
      white-space: pre;
    }

    #terminal::-webkit-scrollbar { width: 3px; }
    #terminal::-webkit-scrollbar-track { background: transparent; }
    #terminal::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    #terminal-content { min-height: 100%; display: flex; flex-direction: column; justify-content: flex-end; }

    #no-session-msg {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 8px;
      color: var(--dim); font-family: var(--ui); text-align: center; padding: 24px;
    }
    #no-session-msg strong { font-size: 16px; color: var(--text); font-weight: 600; }
    #no-session-msg span   { font-size: 13px; line-height: 1.5; }

    #waiting-banner {
      display: none;
      background: rgba(201,160,64,0.1);
      border-top: 1px solid rgba(201,160,64,0.25);
      padding: 8px 14px;
      font-size: 13px; color: var(--gold);
      font-family: var(--ui);
      display: none;
      align-items: center; gap: 8px; flex-shrink: 0;
    }
    #waiting-banner.show { display: flex; }
    #waiting-btns { display: flex; gap: 8px; margin-left: auto; }
    .w-btn {
      padding: 4px 14px; border-radius: 6px; border: 1px solid;
      font-family: var(--ui); font-size: 13px; font-weight: 600; cursor: pointer;
      background: transparent;
    }
    #btn-y { border-color: var(--sage); color: var(--sage); }
    #btn-n { border-color: var(--rose); color: var(--rose); }
    #btn-y:active, #btn-n:active { opacity: 0.7; }

    /* ── Input bar ───────────────────────────────────────── */
    #input-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px 8px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: var(--bg2);
      flex-shrink: 0;
    }

    #mic-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none; flex-shrink: 0;
      background: var(--bg3); color: var(--text); font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #mic-btn:active     { opacity: 0.75; }
    #mic-btn.listening  { background: rgba(199,88,120,0.25); border: 1.5px solid var(--rose); }
    #mic-btn.processing { background: rgba(77,184,194,0.15); border: 1.5px solid var(--teal); }

    #cmd-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 9px 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      -webkit-appearance: none;
      caret-color: var(--teal);
    }
    #cmd-input::placeholder { color: var(--dim); }
    #cmd-input:focus { border-color: rgba(77,184,194,0.35); }

    #send-btn {
      width: 36px; height: 36px; border-radius: 8px; border: none; flex-shrink: 0;
      background: var(--bg3); color: var(--dim); font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0.7; transition: all 0.15s;
    }
    #send-btn.ready { background: var(--teal); color: #0f1117; opacity: 1; }
    #send-btn:active { opacity: 0.75; }

    /* ── Voice indicator ────────────────────────────────── */
    #voice-bar {
      display: none;
      align-items: center; justify-content: center; gap: 8px;
      padding: 5px 14px;
      background: rgba(199,88,120,0.1);
      font-family: var(--ui); font-size: 13px; color: var(--rose);
      flex-shrink: 0;
    }
    #voice-bar.show { display: flex; }
    #voice-dots span {
      display: inline-block; width: 5px; height: 5px; border-radius: 50%;
      background: var(--rose); margin: 0 2px;
      animation: vdot 1.2s ease-in-out infinite;
    }
    #voice-dots span:nth-child(2) { animation-delay: 0.2s; }
    #voice-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes vdot { 0%,80%,100%{transform:scale(0.5);opacity:0.4} 40%{transform:scale(1);opacity:1} }

    /* ── No voice fallback ──────────────────────────────── */
    #no-voice-msg {
      display: none;
      font-size: 11px; color: var(--rose); text-align: center;
      padding: 4px 14px; font-family: var(--ui);
    }

    /* ── New session button ─────────────────────────────── */
    #new-btn {
      width: 28px; height: 28px; border-radius: 7px; border: 1px solid rgba(77,184,194,0.4);
      background: rgba(77,184,194,0.1); color: var(--teal); font-size: 20px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-weight: 300;
    }
    #new-btn:active { opacity: 0.7; }

    /* ── New session sheet ───────────────────────────────── */
    #new-sheet {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75);
      display: none; align-items: flex-end;
    }
    #new-sheet-inner {
      background: var(--bg2); border-radius: 16px 16px 0 0;
      width: 100%; max-height: 80vh;
      display: flex; flex-direction: column;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 8px);
    }
    #new-sheet-title {
      font-size: 13px; font-weight: 600; color: var(--text);
      padding: 14px 16px 0; letter-spacing: -0.2px;
    }
    #repo-search {
      margin: 10px 14px 6px;
      background: var(--bg3); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 9px 12px;
      color: var(--text); font-family: var(--ui); font-size: 14px;
      outline: none; -webkit-appearance: none; caret-color: var(--teal);
    }
    #repo-search::placeholder { color: var(--dim); }
    #repo-search:focus { border-color: rgba(77,184,194,0.3); }
    #repo-list {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .repo-section {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      color: var(--dim); text-transform: uppercase;
      padding: 10px 16px 4px;
    }
    .repo-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; cursor: pointer; font-size: 14px;
    }
    .repo-item:active { background: rgba(255,255,255,0.04); }
    .repo-item.selected { color: var(--teal); }
    .repo-icon { font-size: 16px; flex-shrink: 0; }
    .repo-meta { font-size: 11px; color: var(--dim); margin-top: 1px; }
    .repo-cloned { font-size: 10px; color: var(--sage); }
    #new-sheet-footer {
      padding: 10px 14px 4px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: none; gap: 8px; flex-direction: column;
    }
    #new-sheet-footer.show { display: flex; }
    #sess-name-input {
      background: var(--bg3); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 9px 12px;
      color: var(--text); font-family: var(--mono); font-size: 13px;
      outline: none; -webkit-appearance: none; caret-color: var(--teal); width: 100%;
    }
    #sess-name-input:focus { border-color: rgba(77,184,194,0.3); }
    #start-btn {
      background: var(--teal); color: #0f1117; border: none;
      border-radius: 10px; padding: 12px; font-family: var(--ui);
      font-size: 14px; font-weight: 600; cursor: pointer; width: 100%;
    }
    #start-btn:active { opacity: 0.8; }
    #start-btn:disabled { opacity: 0.4; cursor: default; }
    #start-status { font-size: 12px; color: var(--dim); text-align: center; min-height: 16px; }

    /* ── Spinner ──────────────────────────────────────── */
    .spin {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(77,184,194,0.2); border-top-color: var(--teal);
      border-radius: 50%; animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="logo">Loop</div>
    <div id="session-selector">
      <div id="state-dot"></div>
      <div id="session-name" class="placeholder">No sessions</div>
      <div id="session-arrow">▾</div>
    </div>
    <button id="new-btn" aria-label="New session">+</button>
    <div id="conn-dot" title="Connected"></div>
  </div>

  <div id="terminal">
    <div id="terminal-content">
      <div id="no-session-msg">
        <strong>No sessions running</strong>
        <span>Open Loop on desktop to start a session, then come back here.</span>
      </div>
    </div>
  </div>

  <div id="waiting-banner">
    <span>⏳ Waiting for input</span>
    <div id="waiting-btns">
      <button class="w-btn" id="btn-y">Yes</button>
      <button class="w-btn" id="btn-n">No</button>
    </div>
  </div>

  <div id="voice-bar">
    <div id="voice-dots"><span></span><span></span><span></span></div>
    <span id="voice-label">listening…</span>
  </div>

  <div id="input-bar">
    <button id="mic-btn" aria-label="Voice input">🎤</button>
    <input id="cmd-input" type="text" placeholder="type a command…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="send-btn" aria-label="Send">↑</button>
  </div>

  <div id="no-voice-msg">Voice not supported — use Chrome or Edge</div>

</div>

<!-- New session sheet -->
<div id="new-sheet">
  <div id="new-sheet-inner">
    <div id="new-sheet-title">New Session</div>
    <input id="repo-search" type="search" placeholder="Search repos…" autocomplete="off">
    <div id="repo-list"></div>
    <div id="new-sheet-footer">
      <input id="sess-name-input" type="text" placeholder="Session name…" autocomplete="off" spellcheck="false">
      <div id="start-status"></div>
      <button id="start-btn">Start Session</button>
    </div>
  </div>
</div>

<!-- Session picker -->
<div id="picker">
  <div id="picker-sheet">
    <div id="picker-title">Switch Session</div>
    <div id="picker-list"></div>
  </div>
</div>

<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────────
let sessions     = [];
let activeId     = null;
let lastOutput   = '';
let voiceState   = 'idle'; // idle | listening | processing
let autoScroll   = true;
let pollTimer    = null;

// ── DOM ───────────────────────────────────────────────────────────────────────
const stateDot     = document.getElementById('state-dot');
const sessionName  = document.getElementById('session-name');
const sessionSel   = document.getElementById('session-selector');
const connDot      = document.getElementById('conn-dot');
const terminal     = document.getElementById('terminal');
const termContent  = document.getElementById('terminal-content');
const noSessionMsg = document.getElementById('no-session-msg');
const waitBanner   = document.getElementById('waiting-banner');
const voiceBar     = document.getElementById('voice-bar');
const voiceLabel   = document.getElementById('voice-label');
const micBtn       = document.getElementById('mic-btn');
const cmdInput     = document.getElementById('cmd-input');
const sendBtn      = document.getElementById('send-btn');
const picker       = document.getElementById('picker');
const pickerList   = document.getElementById('picker-list');
const noVoiceMsg   = document.getElementById('no-voice-msg');

// ── Auto-scroll detection ─────────────────────────────────────────────────────
terminal.addEventListener('scroll', () => {
  const atBottom = terminal.scrollHeight - terminal.scrollTop - terminal.clientHeight < 40;
  autoScroll = atBottom;
});

function scrollToBottom() {
  if (autoScroll) terminal.scrollTop = terminal.scrollHeight;
}

// ── Session polling ───────────────────────────────────────────────────────────
async function pollSessions() {
  try {
    const resp = await fetch('/api/sessions');
    if (resp.status === 401) { location.href = '/auth/login'; return; }
    if (!resp.ok) throw new Error(resp.status);
    const list = await resp.json();
    connDot.classList.remove('err');
    sessions = Array.isArray(list) ? list : [];

    // Auto-select: keep current if still exists, else pick first
    if (sessions.length && (!activeId || !sessions.find(s => s.id === activeId))) {
      activeId = sessions[0].id;
    }
    if (!sessions.length) activeId = null;

    renderHeader();
    if (activeId) await pollOutput();
    else          renderEmpty();
  } catch {
    connDot.classList.add('err');
  }
}

async function pollOutput() {
  if (!activeId) return;
  try {
    const resp = await fetch(`/api/sessions/${activeId}/output`);
    if (!resp.ok) return;
    const { output } = await resp.json();
    if (output === lastOutput) return; // nothing changed
    lastOutput = output;
    renderTerminal(output);
  } catch {}
}

// ── Classify session state ────────────────────────────────────────────────────
function classify(output) {
  const text = stripAnsi(output || '');
  const tail = text.split('\n').slice(-8).join('\n');
  if (/Do you want|Should I|\[Y\/n\]|\(y\/n\)|\(Y\/N\)|Press Enter|Continue\?|proceed\?|Approve\?/i.test(tail)) return 'waiting';
  if (text.trim().length > 10) return 'active';
  return 'idle';
}

function stripAnsi(str) {
  return str.replace(/\x1b\[[0-9;]*[mGKHFJKSTsuA-Za-z]/g, '')
            .replace(/\x1b\][^\x07]*\x07/g, '')
            .replace(/\r/g, '');
}

// ── Render header ─────────────────────────────────────────────────────────────
function renderHeader() {
  if (!activeId) {
    sessionName.textContent = 'No sessions';
    sessionName.classList.add('placeholder');
    stateDot.className = '';
    sessionSel.style.cursor = 'default';
    document.getElementById('session-arrow').style.opacity = '0';
    return;
  }
  const s = sessions.find(s => s.id === activeId);
  if (!s) return;
  sessionName.textContent = s.name;
  sessionName.classList.remove('placeholder');
  document.getElementById('session-arrow').style.opacity = sessions.length > 1 ? '1' : '0';
  sessionSel.style.cursor = sessions.length > 1 ? 'pointer' : 'default';
  const state = classify(lastOutput);
  stateDot.className = state;
  waitBanner.classList.toggle('show', state === 'waiting');
}

// ── Render terminal ───────────────────────────────────────────────────────────
// Lines that are part of Claude Code's bottom chrome (not real content)
function isChromeLine(line) {
  const t = line.trim();
  if (!t) return true;                                       // blank
  if (/^[─━═╌┄\-─]{4,}$/.test(t)) return true;             // separator bar
  if (/^[❯>]\s*$/.test(t)) return true;                     // prompt cursor
  if (t.includes('? for shortcuts')) return true;            // status bar
  if (t.includes('◐') || t.includes('◑') || t.includes('◒') || t.includes('◓')) return true; // spinner
  if (t.includes('· /effort') || t.includes('medium') && t.includes('effort')) return true;
  return false;
}

function renderTerminal(raw) {
  noSessionMsg.style.display = 'none';
  const clean = stripAnsi(raw);
  let lines = clean.split('\n');
  // Drop leading blank lines (printf padding artifact)
  while (lines.length && !lines[0].trim()) lines.shift();
  // Strip Claude Code bottom chrome: blank lines, separators, prompt, status bar
  while (lines.length && isChromeLine(lines[lines.length - 1])) lines.pop();
  // Keep last 200 lines
  const shown = lines.slice(-200).join('\n');
  termContent.textContent = shown;
  scrollToBottom();
  renderHeader(); // update state dot + waiting banner
}

function renderEmpty() {
  termContent.textContent = '';
  noSessionMsg.style.display = 'flex';
  waitBanner.classList.remove('show');
  stateDot.className = '';
}

// ── Session picker ────────────────────────────────────────────────────────────
sessionSel.addEventListener('click', () => {
  if (sessions.length <= 1) return;
  pickerList.innerHTML = '';
  sessions.forEach(s => {
    const state = s.id === activeId ? classify(lastOutput) : 'idle';
    const colors = { active: '#5cb87a', waiting: '#c9a040', idle: '#454340' };
    const el = document.createElement('div');
    el.className = 'picker-item' + (s.id === activeId ? ' active-session' : '');
    el.innerHTML = `<div class="picker-dot" style="background:${colors[state] || colors.idle}"></div>${escText(s.name)}`;
    el.addEventListener('click', () => {
      activeId = s.id;
      lastOutput = '';
      picker.style.display = 'none';
      pollOutput();
      renderHeader();
    });
    pickerList.appendChild(el);
  });
  picker.style.display = 'flex';
});

picker.addEventListener('click', e => { if (e.target === picker) picker.style.display = 'none'; });

// ── Send input to session ─────────────────────────────────────────────────────
async function sendInput(text) {
  if (!activeId) return;
  try {
    await fetch(`/api/sessions/${activeId}/input`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text.trim() })
    });
    setTimeout(pollOutput, 600);
  } catch {}
}

// Text input
cmdInput.addEventListener('input', () => {
  sendBtn.classList.toggle('ready', cmdInput.value.trim().length > 0);
});

cmdInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    sendInput(cmdInput.value);
    cmdInput.value = '';
    sendBtn.classList.remove('ready');
  }
});

// Send button: send text if present, or just Enter if empty (for interactive prompts)
sendBtn.addEventListener('click', () => {
  sendInput(cmdInput.value);
  cmdInput.value = '';
  sendBtn.classList.remove('ready');
});

// Waiting buttons
document.getElementById('btn-y').addEventListener('click', () => sendInput('y'));
document.getElementById('btn-n').addEventListener('click', () => sendInput('n'));

// ── Voice ─────────────────────────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SR) {
  micBtn.style.display = 'none';
  noVoiceMsg.style.display = 'block';
} else {
  const rec = new SR();
  rec.lang = 'en-US';
  rec.interimResults = true;
  rec.continuous = false;

  let interimEl = null;

  rec.onresult = e => {
    let interim = '', final = '';
    for (const r of e.results) {
      if (r.isFinal) final += r[0].transcript;
      else interim += r[0].transcript;
    }
    // Show interim in the input box as preview
    cmdInput.value = interim || final;
    sendBtn.classList.toggle('ready', cmdInput.value.trim().length > 0);
    if (final) {
      sendInput(final);
      cmdInput.value = '';
      sendBtn.classList.remove('ready');
      setVoice('idle');
    }
  };

  rec.onerror = e => { console.warn('[voice]', e.error); setVoice('idle'); };
  rec.onend   = () => { if (voiceState === 'listening') setVoice('idle'); };

  micBtn.addEventListener('click', () => {
    if (!activeId) { cmdInput.focus(); return; }
    if (voiceState === 'listening') {
      rec.stop(); setVoice('idle');
    } else {
      rec.start(); setVoice('listening');
    }
  });
}

function setVoice(state) {
  voiceState = state;
  micBtn.classList.remove('listening', 'processing');
  if (state === 'listening') {
    micBtn.classList.add('listening');
    micBtn.textContent = '🎙️';
    voiceBar.classList.add('show');
    voiceLabel.textContent = 'listening…';
  } else {
    micBtn.textContent = '🎤';
    voiceBar.classList.remove('show');
    cmdInput.value = '';
    sendBtn.classList.remove('ready');
  }
}

// ── New session ───────────────────────────────────────────────────────────────
const newSheet     = document.getElementById('new-sheet');
const repoSearch   = document.getElementById('repo-search');
const repoList     = document.getElementById('repo-list');
const sheetFooter  = document.getElementById('new-sheet-footer');
const sessNameInput= document.getElementById('sess-name-input');
const startBtn     = document.getElementById('start-btn');
const startStatus  = document.getElementById('start-status');

let allProjects = [];   // { name, path } from /api/projects
let allRepos    = [];   // { name, full_name, url } from /api/repos
let selectedRepo= null; // { name, path, needsClone, cloneUrl }

document.getElementById('new-btn').addEventListener('click', openNewSheet);
newSheet.addEventListener('click', e => { if (e.target === newSheet) closeNewSheet(); });
repoSearch.addEventListener('input', renderRepoList);

async function openNewSheet() {
  selectedRepo = null;
  sheetFooter.classList.remove('show');
  repoSearch.value = '';
  repoList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--dim)"><span class="spin"></span></div>';
  newSheet.style.display = 'flex';
  repoSearch.focus();

  const [proj, repos] = await Promise.all([
    fetch('/api/projects').then(r => r.ok ? r.json() : []).catch(() => []),
    fetch('/api/repos').then(r => r.ok ? r.json() : []).catch(() => [])
  ]);
  allProjects = Array.isArray(proj) ? proj : [];
  allRepos    = Array.isArray(repos) ? repos : [];
  renderRepoList();
}

function closeNewSheet() {
  newSheet.style.display = 'none';
}

function renderRepoList() {
  const q = repoSearch.value.trim().toLowerCase();
  const localNames = new Set(allProjects.map(p => p.name.toLowerCase()));

  const filtProjects = allProjects.filter(p => !q || p.name.toLowerCase().includes(q));
  const filtRepos    = allRepos.filter(r =>
    (!q || r.name.toLowerCase().includes(q) || (r.full_name||'').toLowerCase().includes(q)) &&
    !localNames.has(r.name.toLowerCase())  // hide if already cloned locally
  );

  let html = '';

  if (filtProjects.length) {
    html += `<div class="repo-section">Local Projects</div>`;
    filtProjects.forEach(p => {
      const sel = selectedRepo && selectedRepo.name === p.name && !selectedRepo.needsClone;
      html += `<div class="repo-item${sel?' selected':''}" data-type="local" data-name="${escText(p.name)}" data-path="${escText(p.path)}">
        <span class="repo-icon">📁</span>
        <div><div>${escText(p.name)}</div></div>
      </div>`;
    });
  }

  if (filtRepos.length) {
    html += `<div class="repo-section">GitHub</div>`;
    filtRepos.forEach(r => {
      const sel = selectedRepo && selectedRepo.name === r.name && selectedRepo.needsClone;
      html += `<div class="repo-item${sel?' selected':''}" data-type="gh" data-name="${escText(r.name)}" data-url="${escText(r.url||'')}">
        <span class="repo-icon">${r.private ? '🔒' : '📦'}</span>
        <div>
          <div>${escText(r.name)}</div>
          <div class="repo-meta">${escText(r.full_name||'')} <span class="repo-cloned">clone + start</span></div>
        </div>
      </div>`;
    });
  }

  if (!filtProjects.length && !filtRepos.length) {
    html = `<div style="padding:24px;text-align:center;color:var(--dim);font-size:13px">No repos found</div>`;
  }

  repoList.innerHTML = html;

  repoList.querySelectorAll('.repo-item').forEach(el => {
    el.addEventListener('click', () => {
      const type = el.dataset.type;
      if (type === 'local') {
        selectedRepo = { name: el.dataset.name, path: el.dataset.path, needsClone: false };
      } else {
        selectedRepo = { name: el.dataset.name, needsClone: true, cloneUrl: el.dataset.url };
      }
      sessNameInput.value = selectedRepo.name;
      sheetFooter.classList.add('show');
      startStatus.textContent = '';
      renderRepoList();
      sessNameInput.focus();
    });
  });
}

startBtn.addEventListener('click', async () => {
  if (!selectedRepo) return;
  const name = sessNameInput.value.trim().replace(/[^a-zA-Z0-9_-]/g, '-') || selectedRepo.name;
  startBtn.disabled = true;
  startStatus.textContent = '';

  try {
    let directory = selectedRepo.path;

    if (selectedRepo.needsClone) {
      startStatus.textContent = 'Cloning repo…';
      const cr = await fetch('/api/projects/clone', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ repo: selectedRepo.cloneUrl || selectedRepo.name })
      });
      if (!cr.ok) {
        const e = await cr.json().catch(() => ({}));
        // 409 = already exists, use it
        if (cr.status === 409) {
          directory = e.path;
        } else {
          throw new Error(e.error || 'Clone failed');
        }
      } else {
        const d = await cr.json();
        directory = d.path;
      }
    }

    startStatus.textContent = 'Starting session…';
    const sr = await fetch('/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, directory, mode: 'claude' })
    });
    if (!sr.ok) {
      const e = await sr.json().catch(() => ({}));
      throw new Error(e.error || 'Failed to start session');
    }

    closeNewSheet();
    await pollSessions();
    // Switch to the new session
    const created = sessions.find(s => s.id === name || s.name === name);
    if (created) { activeId = created.id; lastOutput = ''; renderHeader(); pollOutput(); }

  } catch (err) {
    startStatus.textContent = err.message;
    startBtn.disabled = false;
  }
});

// ── Utils ─────────────────────────────────────────────────────────────────────
function escText(str) {
  return str.replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
}

// ── Service worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── Boot ──────────────────────────────────────────────────────────────────────
pollSessions();
// Poll sessions list every 10s, output every 2s
setInterval(pollSessions, 10000);
setInterval(() => { if (activeId) pollOutput(); }, 2000);
</script>
</body>
</html>
