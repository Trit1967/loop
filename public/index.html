<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Base — brighter dark mode */
      --void: #0a0c16;
      --base: #0f1220;
      --sf: #151828;
      --sf2: #1a1e32;
      --sf3: #222840;
      --raised: #2a3050;

      /* 4 Wire Colors */
      --w1: #00e5ff;  /* Cyan — primary */
      --w2: #ff2d78;  /* Magenta — primary */
      --w3: #39ff14;  /* Neon Green — accent */
      --w4: #ffb300;  /* Amber — accent */

      /* Derived */
      --w1sub: rgba(0,229,255,0.12);
      --w2sub: rgba(255,45,120,0.12);
      --w3sub: rgba(57,255,20,0.12);
      --w4sub: rgba(255,179,0,0.12);
      --w1glow: 0 0 10px rgba(0,229,255,0.35);
      --w2glow: 0 0 10px rgba(255,45,120,0.35);
      --w3glow: 0 0 10px rgba(57,255,20,0.35);
      --w4glow: 0 0 10px rgba(255,179,0,0.35);

      /* Text — brighter */
      --tx: #e4e7f0;
      --tx2: #9498b0;
      --tx3: #5a5f78;

      /* Border — brighter */
      --line: rgba(0,229,255,0.12);
      --line2: rgba(0,229,255,0.22);

      --r: 4px;
      --rl: 8px;
      --t: 120ms ease-out;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--mono);
      background: var(--void);
      color: var(--tx);
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--tx3); border-radius: 2px; }

    /* ═══ Canvas ═══ */
    #cv { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ═══ Login ═══ */
    .login {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: var(--sf); border: 1px solid var(--line2);
      border-radius: var(--rl); padding: 48px 56px; text-align: center; z-index: 1;
      box-shadow: 0 0 40px rgba(0,229,255,0.05);
    }
    .login h1 {
      font-size: 24px; font-weight: 300; letter-spacing: 6px;
      text-transform: uppercase; color: var(--w1); margin-bottom: 4px;
    }
    .login p { font-size: 11px; color: var(--tx3); margin-bottom: 36px; letter-spacing: 2px; text-transform: uppercase; }
    .login-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: transparent; color: var(--w1); border: 1px solid var(--w1);
      border-radius: var(--r); padding: 11px 28px; font-family: var(--mono);
      font-size: 12px; font-weight: 500; cursor: pointer; letter-spacing: 1px;
      text-transform: uppercase; transition: all var(--t);
    }
    .login-btn:hover { background: var(--w1); color: var(--void); box-shadow: var(--w1glow); }
    .login-btn svg { width: 18px; height: 18px; }

    /* ═══ App Layout ═══ */
    .app {
      display: grid;
      grid-template-columns: 220px 1fr 260px;
      grid-template-rows: 44px 1fr;
      height: 100vh; position: relative; z-index: 1;
    }

    /* ═══ Header ═══ */
    .hd {
      grid-column: 1 / -1;
      display: flex; align-items: center; padding: 0 12px; gap: 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(8,10,18,0.9); backdrop-filter: blur(8px); z-index: 10;
    }
    .hd-brand {
      font-size: 13px; font-weight: 300; color: var(--w1);
      letter-spacing: 3px; text-transform: uppercase;
    }
    .hd-brand b { font-weight: 600; }
    .hd-sep { width: 1px; height: 18px; background: var(--line2); }
    .hd-stat {
      font-size: 12px; color: var(--tx3); display: flex; align-items: center; gap: 5px;
    }
    .hd-live {
      width: 5px; height: 5px; border-radius: 50%; background: var(--w3);
      box-shadow: var(--w3glow); animation: pulse 2s ease-in-out infinite;
    }
    .hd-fill { flex: 1; }
    /* Header wire indicators — mini colored lines */
    .hd-wires {
      display: flex; gap: 3px; align-items: center;
    }
    .hd-wire {
      width: 16px; height: 2px; border-radius: 1px; opacity: 0.5;
    }
    .hd-user { display: flex; align-items: center; gap: 8px; }
    .hd-avatar { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--line2); }
    .hd-name { font-size: 12px; color: var(--tx2); }
    .hd-out {
      font-size: 11px; color: var(--tx3); background: none; border: 1px solid var(--line);
      cursor: pointer; font-family: var(--mono); padding: 3px 10px; border-radius: var(--r);
      letter-spacing: 0.5px; text-transform: uppercase; transition: all var(--t);
    }
    .hd-out:hover { color: var(--w2); border-color: var(--w2); }

    /* ═══ Left Sidebar ═══ */
    .sb {
      border-right: 1px solid var(--line);
      background: rgba(8,10,18,0.6);
      overflow-y: auto; display: flex; flex-direction: column; z-index: 5;
      padding: 8px 0;
    }
    .sb-head {
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px;
      padding: 12px 14px 6px; display: flex; align-items: center;
      justify-content: space-between; cursor: pointer; user-select: none;
      transition: color var(--t);
    }
    .sb-head.w1 { color: var(--w1); }
    .sb-head.w3 { color: var(--w3); }
    .sb-head.w4 { color: var(--w4); }
    .sb-head .chev { font-size: 12px; transition: transform var(--t); }
    .sb-head.shut .chev { transform: rotate(-90deg); }
    .sb-grp { padding: 0 6px; }
    .sb-grp.shut { display: none; }

    .sb-search {
      margin: 0 8px 6px; width: calc(100% - 16px);
      background: var(--void); border: 1px solid var(--line);
      border-radius: var(--r); padding: 7px 10px; font-family: var(--mono);
      font-size: 12px; color: var(--tx); outline: none; transition: border-color var(--t);
    }
    .sb-search::placeholder { color: var(--tx3); }
    .sb-search:focus { border-color: var(--w1); box-shadow: var(--w1glow); }

    /* ── Skill items ── */
    .sk {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 4px; cursor: grab;
      transition: all var(--t); border: 1px solid transparent; margin-bottom: 1px;
    }
    .sk:hover { background: var(--sf3); border-color: var(--line2); }
    .sk.dragging { opacity: 0.3; }
    .sk-wire {
      width: 10px; height: 2px; border-radius: 1px; flex-shrink: 0;
    }
    .sk-wire.w1 { background: var(--w1); box-shadow: var(--w1glow); }
    .sk-wire.w3 { background: var(--w3); box-shadow: var(--w3glow); }
    .sk-name {
      font-size: 13px; font-weight: 400; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--tx2);
    }
    .sk:hover .sk-name { color: var(--tx); }
    .sk-tag {
      font-size: 12px; color: var(--tx3); opacity: 0;
      transition: opacity var(--t); flex-shrink: 0;
    }
    .sk:hover .sk-tag { opacity: 1; }

    /* ── Cron ── */
    .cron {
      padding: 5px 7px; border-radius: 3px; border-left: 2px solid var(--w4);
      background: var(--sf); margin-bottom: 3px; margin-left: 6px; margin-right: 6px;
    }
    .cron-top { display: flex; align-items: center; justify-content: space-between; }
    .cron-name { font-size: 12px; color: var(--tx2); }
    .cron-sched { font-size: 11px; color: var(--w4); }
    .cron-skill { font-size: 11px; color: var(--tx3); }
    .cron-x {
      background: none; border: none; color: var(--tx3); cursor: pointer;
      font-size: 11px; padding: 0 2px; border-radius: 2px; transition: all var(--t);
    }
    .cron-x:hover { color: var(--w2); }

    .sb-drop {
      margin: 6px 8px; padding: 10px; border: 1px dashed var(--line2);
      border-radius: var(--r); text-align: center; font-size: 11px;
      color: var(--tx3); transition: all var(--t); letter-spacing: 0.5px;
    }
    .sb-drop.over { border-color: var(--w4); background: var(--w4sub); color: var(--w4); box-shadow: var(--w4glow); }

    .sb-btn {
      display: flex; align-items: center; gap: 5px; width: calc(100% - 16px);
      margin: 2px 8px; padding: 4px 7px; background: transparent;
      border: 1px solid var(--line); border-radius: var(--r);
      color: var(--tx3); font-family: var(--mono); font-size: 11px;
      cursor: pointer; transition: all var(--t); letter-spacing: 0.5px;
    }
    .sb-btn:hover { border-color: var(--w4); color: var(--w4); }

    .sb-foot {
      margin-top: auto; padding: 10px 12px;
      font-size: 11px; color: var(--tx3); letter-spacing: 2px; text-transform: uppercase;
      border-top: 1px solid var(--line);
    }

    /* ═══ Workspace ═══ */
    .ws { position: relative; overflow: hidden; }
    .term-panel {
      position: absolute; inset: 6px;
      background: var(--base); border: 1px solid var(--line2);
      border-radius: var(--rl);
      display: flex; flex-direction: column; overflow: hidden; z-index: 2;
    }

    /* Tabs */
    .tabs {
      display: flex; align-items: stretch; height: 38px;
      border-bottom: 1px solid var(--line); background: var(--void); flex-shrink: 0;
      overflow-x: auto;
    }
    .tabs::-webkit-scrollbar { height: 0; }
    .tab {
      display: flex; align-items: center; gap: 8px;
      padding: 0 16px; font-size: 13px; font-weight: 500;
      color: var(--tx3); border-right: 1px solid var(--line);
      cursor: pointer; transition: all var(--t); white-space: nowrap; position: relative;
    }
    .tab:hover { color: var(--tx2); background: rgba(255,255,255,0.015); }
    .tab.active { color: var(--w1); background: var(--sf); }
    .tab.active::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: var(--w1); box-shadow: var(--w1glow);
    }
    .tab.drop-target { background: var(--w2sub); color: var(--w2); }
    .tab-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
    .tab-dot.live { background: var(--w3); box-shadow: var(--w3glow); }
    .tab-dot.demo { background: var(--w4); box-shadow: var(--w4glow); }
    .tab-close {
      background: none; border: none; color: var(--tx3); cursor: pointer;
      font-size: 12px; padding: 0 1px; line-height: 1; opacity: 0; transition: all var(--t);
    }
    .tab:hover .tab-close { opacity: 0.6; }
    .tab-close:hover { opacity: 1; color: var(--w2); }
    .tab-add {
      width: 32px; background: none; border: none; border-right: 1px solid var(--line);
      color: var(--tx3); font-size: 15px; cursor: pointer; transition: all var(--t); flex-shrink: 0;
    }
    .tab-add:hover { color: var(--w1); }

    .tw { flex: 1; position: relative; overflow: hidden; }
    .ti { position: absolute; inset: 0; padding: 4px; }
    .ti.hidden { display: none; }
    .term-empty {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
    }
    .term-empty b { font-size: 12px; color: var(--tx2); font-weight: 400; letter-spacing: 1px; }
    .term-empty span { font-size: 12px; color: var(--tx3); }

    /* ═══ Right Panel ═══ */
    .rp {
      border-left: 1px solid var(--line);
      background: rgba(8,10,18,0.6);
      overflow-y: auto; display: flex; flex-direction: column; z-index: 5;
    }
    .rp-sec { padding: 10px 12px; border-bottom: 1px solid var(--line); }
    .rp-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1.5px; margin-bottom: 8px;
    }
    .rp-title.w1 { color: var(--w1); }
    .rp-title.w2 { color: var(--w2); }
    .rp-title.w3 { color: var(--w3); }
    .rp-title.w4 { color: var(--w4); }

    /* Session info */
    .si { display: flex; justify-content: space-between; padding: 2px 0; font-size: 12px; }
    .si-k { color: var(--tx3); }
    .si-v { color: var(--tx2); text-align: right; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .si-live {
      display: inline-flex; align-items: center; gap: 4px;
    }
    .si-dot { width: 4px; height: 4px; border-radius: 50%; display: inline-block; }

    /* Skill detail */
    .skd { display: none; }
    .skd.vis { display: block; }
    .skd-name { font-size: 12px; font-weight: 500; margin-bottom: 3px; }
    .skd-type {
      font-size: 8px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; padding: 1px 6px; border-radius: 2px;
      display: inline-block; margin-bottom: 6px;
    }
    .skd-type.skill { background: var(--w1sub); color: var(--w1); }
    .skd-type.command { background: var(--w3sub); color: var(--w3); }
    .skd-desc { font-size: 12px; color: var(--tx2); line-height: 1.5; }

    /* Quick actions */
    .qa {
      display: grid; grid-template-columns: 1fr 1fr; gap: 3px;
    }
    .qa button {
      padding: 6px 4px; background: var(--sf); border: 1px solid var(--line);
      border-radius: var(--r); font-family: var(--mono); font-size: 11px;
      color: var(--tx3); cursor: pointer; transition: all var(--t);
      text-align: center; letter-spacing: 0.3px;
    }
    .qa button:hover { border-color: var(--w2); color: var(--w2); box-shadow: var(--w2glow); }

    /* Activity */
    .af { font-size: 12px; }
    .af-i { display: flex; gap: 7px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
    .af-i:last-child { border-bottom: none; }
    .af-t { color: var(--tx3); flex-shrink: 0; font-size: 11px; }
    .af-m { color: var(--tx2); line-height: 1.4; }
    .af-m b { color: var(--w1); font-weight: 500; }

    /* System bars */
    .sys { margin-bottom: 6px; }
    .sys:last-child { margin-bottom: 0; }
    .sys-lbl { display: flex; justify-content: space-between; font-size: 11px; color: var(--tx3); margin-bottom: 2px; }
    .sys-lbl span:last-child { color: var(--tx2); }
    .sys-bar { height: 3px; background: var(--sf3); border-radius: 2px; overflow: hidden; }
    .sys-fill { height: 100%; border-radius: 2px; transition: width 600ms ease-out; }

    /* ═══ Modal ═══ */
    .mo {
      position: fixed; inset: 0; background: rgba(4,5,10,0.7);
      z-index: 200; display: none; align-items: center; justify-content: center;
    }
    .mo.open { display: flex; }
    .mo-box {
      background: var(--sf); border: 1px solid var(--line2);
      border-radius: var(--rl); padding: 22px; width: 360px; max-width: 92vw;
      box-shadow: 0 0 30px rgba(0,229,255,0.06);
    }
    .mo-box h3 {
      font-size: 12px; font-weight: 400; letter-spacing: 2px;
      text-transform: uppercase; color: var(--w1); margin-bottom: 16px;
    }
    .ff { margin-bottom: 10px; }
    .ff label {
      display: block; font-size: 11px; color: var(--tx3); margin-bottom: 3px;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .ff input {
      width: 100%; background: var(--void); border: 1px solid var(--line);
      border-radius: var(--r); padding: 6px 8px; font-family: var(--mono);
      font-size: 12px; color: var(--tx); outline: none; transition: all var(--t);
    }
    .ff input:focus { border-color: var(--w1); box-shadow: var(--w1glow); }
    .ff input::placeholder { color: var(--tx3); }
    .mo-act { display: flex; justify-content: flex-end; gap: 6px; margin-top: 14px; }
    .btn {
      font-family: var(--mono); font-size: 12px; font-weight: 500;
      padding: 6px 14px; border: 1px solid var(--line); border-radius: var(--r);
      background: transparent; color: var(--tx2); cursor: pointer;
      transition: all var(--t); letter-spacing: 0.5px; text-transform: uppercase;
    }
    .btn:hover { border-color: var(--tx2); color: var(--tx); }
    .btn-go { border-color: var(--w1); color: var(--w1); }
    .btn-go:hover { background: var(--w1); color: var(--void); box-shadow: var(--w1glow); }

    /* ═══ Toast ═══ */
    .toast {
      position: fixed; bottom: 16px; left: 50%;
      transform: translateX(-50%) translateY(50px);
      background: var(--sf3); border: 1px solid var(--line2);
      border-radius: var(--r); padding: 6px 16px; font-size: 12px;
      z-index: 300; opacity: 0; transition: all 180ms ease-out; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    .sk { animation: fadeUp 100ms ease-out both; }
  </style>
</head>
<body>
  <canvas id="cv"></canvas>

  <div class="login" id="login" style="display:none">
    <div class="login-card">
      <h1>Claude</h1>
      <p>Terminal Platform</p>
      <button class="login-btn" onclick="location.href='/auth/login'">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        Authenticate
      </button>
    </div>
  </div>

  <div class="app" id="app" style="display:none">
    <header class="hd">
      <div class="hd-brand"><b>CLAUDE</b> TERMINAL</div>
      <div class="hd-sep"></div>
      <div class="hd-stat"><div class="hd-live"></div> ONLINE</div>
      <div class="hd-sep"></div>
      <div class="hd-wires">
        <div class="hd-wire" style="background:var(--w1)"></div>
        <div class="hd-wire" style="background:var(--w2)"></div>
        <div class="hd-wire" style="background:var(--w3)"></div>
        <div class="hd-wire" style="background:var(--w4)"></div>
      </div>
      <div class="hd-fill"></div>
      <div class="hd-user" id="hd-user"></div>
    </header>

    <aside class="sb">
      <input class="sb-search" id="sk-search" type="search" placeholder="FILTER..." spellcheck="false" />

      <div class="sb-head w1" data-toggle="sk-skills">SKILLS <span class="chev">&#9662;</span></div>
      <div class="sb-grp" id="sk-skills"></div>

      <div class="sb-head w3" data-toggle="sk-cmds">COMMANDS <span class="chev">&#9662;</span></div>
      <div class="sb-grp" id="sk-cmds"></div>

      <div class="sb-head w4" data-toggle="sk-crons">SCHEDULED <span class="chev">&#9662;</span></div>
      <div class="sb-grp" id="sk-crons"></div>
      <button class="sb-btn" id="btn-cron">+ SCHEDULE</button>

      <div class="sb-drop" id="cron-zone">DROP TO SCHEDULE</div>

      <div class="sb-foot">your-domain.com</div>
    </aside>

    <main class="ws">
      <div class="term-panel">
        <div class="tabs">
          <div id="tab-list" style="display:flex;"></div>
          <button class="tab-add" id="btn-tab" title="New session (Ctrl+T)">+</button>
        </div>
        <div class="tw" id="tw">
          <div class="term-empty" id="term-empty">
            <b>NO ACTIVE SESSIONS</b>
            <span>Press + to initialize</span>
          </div>
        </div>
      </div>
    </main>

    <aside class="rp">
      <div class="rp-sec">
        <div class="rp-title w1">SESSION</div>
        <div class="si"><span class="si-k">name</span><span class="si-v" id="rp-sn">—</span></div>
        <div class="si"><span class="si-k">dir</span><span class="si-v" id="rp-sd">—</span></div>
        <div class="si"><span class="si-k">status</span><span class="si-v"><span class="si-live"><span class="si-dot" id="rp-dot" style="background:var(--tx3)"></span> <span id="rp-ss">idle</span></span></span></div>
        <div class="si"><span class="si-k">sessions</span><span class="si-v" id="rp-sc">0</span></div>
      </div>

      <div class="rp-sec skd" id="rp-skd">

  <script>
    /* ═══ 4-Color Wire Particles ═══ */
    const WIRES = [
      [0,229,255],  // cyan
      [255,45,120], // magenta
      [57,255,20],  // green
      [255,179,0],  // amber
    ];

    class Net {
      constructor(c) {
        this.c=c; this.x=c.getContext('2d'); this.pts=[];
        this.mx=-999; this.my=-999;
        this.resize(); this.seed();
        addEventListener('resize',()=>this.resize());
        document.addEventListener('mousemove',e=>{this.mx=e.clientX;this.my=e.clientY;});
        this.go();
      }
      resize(){ this.w=this.c.width=innerWidth; this.h=this.c.height=innerHeight; }
      seed(){
        const n=Math.min(Math.floor(this.w*this.h/13000),140);
        for(let i=0;i<n;i++) this.pts.push({
          x:Math.random()*this.w, y:Math.random()*this.h,
          vx:(Math.random()-0.5)*0.2, vy:(Math.random()-0.5)*0.2,
          r:Math.random()*1.2+0.3,
          ci:Math.floor(Math.random()*4), // wire color index
          o:Math.random()*0.4+0.1
        });
      }
      go(){
        const{x:ctx,w,h,pts,mx,my}=this;
        ctx.clearRect(0,0,w,h);
        for(const p of pts){
          p.x+=p.vx; p.y+=p.vy;
          if(p.x<0||p.x>w)p.vx*=-1;
          if(p.y<0||p.y>h)p.vy*=-1;
          const dx=p.x-mx,dy=p.y-my,md=Math.sqrt(dx*dx+dy*dy);
          if(md<80){p.x+=dx*0.012;p.y+=dy*0.012;}
        }
        // Wire connections — color from source particle
        ctx.lineWidth=0.5;
        for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
          const a=pts[i],b=pts[j],d=Math.hypot(a.x-b.x,a.y-b.y);
          if(d<105){
            const c=WIRES[a.ci], alpha=(1-d/105)*0.12;
            ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
            ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
          }
        }
        // Dots — own wire color
        for(const p of pts){
          const c=WIRES[p.ci];
          ctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},${p.o})`;
          ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
        }
        requestAnimationFrame(()=>this.go());
      }
    }

    /* ═══ State ═══ */
    const DEV=location.protocol==='file:'||location.hostname==='localhost';
    const sess=new Map();
    let activeId=null, currentUser=null, allSkills=[], cronJobs=[];
    const activity=[];

    /* ═══ API ═══ */
    async function api(p,o={}){
      const r=await fetch(p,{headers:{'Content-Type':'application/json'},...o,body:o.body?JSON.stringify(o.body):undefined});
      if(r.status===401){showLogin();throw Error('401');}
      if(!r.ok)throw Error(await r.text());
      return r.json();
    }

    /* ═══ Terminal ═══ */
    const TH={
      background:'#0f1220',foreground:'#e4e7f0',cursor:'#00e5ff',cursorAccent:'#0f1220',
      selectionBackground:'rgba(0,229,255,0.2)',selectionForeground:'#fff',
      black:'#1c2033',red:'#ff2d78',green:'#39ff14',yellow:'#ffb300',
      blue:'#00e5ff',magenta:'#a855f7',cyan:'#00e5ff',white:'#c8ccd8',
      brightBlack:'#3a3f55',brightRed:'#ff5c96',brightGreen:'#66ff44',brightYellow:'#ffc633',
      brightBlue:'#44edff',brightMagenta:'#c084fc',brightCyan:'#44edff',brightWhite:'#e8eaf0'
    };

    function mkTerm(id,name,dir){
      const term=new Terminal({
        fontFamily:"'JetBrains Mono',monospace",fontSize:15,lineHeight:1.35,
        theme:TH,cursorBlink:true,cursorStyle:'bar',scrollback:5000
      });
      const fit=new FitAddon.FitAddon();
      term.loadAddon(fit);
      const el=document.createElement('div');
      el.className='ti hidden'; el.dataset.session=id;
      $('tw').appendChild(el); term.open(el);
      try{term.loadAddon(new WebglAddon.WebglAddon())}catch(e){}

      let ws=null;
      if(!DEV){
        const proto=location.protocol==='https:'?'wss':'ws';
        ws=new WebSocket(`${proto}://${location.host}/ws/terminal/${id}`);
        ws.binaryType='arraybuffer';
        ws.onopen=()=>{fit.fit();ws.send(JSON.stringify({type:'resize',cols:term.cols,rows:term.rows}))};
        ws.onmessage=e=>term.write(e.data instanceof ArrayBuffer?new Uint8Array(e.data):e.data);
        ws.onclose=()=>term.write('\r\n\x1b[38;2;58;63;85m--- disconnected ---\x1b[0m\r\n');
        term.onData(d=>{if(ws.readyState===1)ws.send(d)});
        term.onResize(({cols,rows})=>{if(ws.readyState===1)ws.send(JSON.stringify({type:'resize',cols,rows}))});
      }

      sess.set(id,{term,ws,el,fit,name,dir:dir||'/home/claude/projects/'+name});
      addTab(id,name);
      switchTo(id);
      $('term-empty').style.display='none';
      new ResizeObserver(()=>{if(activeId===id)fit.fit()}).observe(el);
      log(`Session <b>${esc(name)}</b> initialized`);
      return{term,ws,el};
    }

    function switchTo(id){
      activeId=id;
      sess.forEach((s,sid)=>{
        s.el.classList.toggle('hidden',sid!==id);
        if(sid===id)setTimeout(()=>s.fit.fit(),10);
      });
      document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.session===id));
      upRP();
    }

    function killSess(id){
      const s=sess.get(id);
      if(!s)return;
      if(s.ws&&s.ws.readyState===1)s.ws.close();
      s.term.dispose();s.el.remove();sess.delete(id);
      document.querySelector(`.tab[data-session="${id}"]`)?.remove();
      if(sess.size>0)switchTo(sess.keys().next().value);
      else{activeId=null;$('term-empty').style.display='flex';}
      if(!DEV)api(`/api/sessions/${id}`,{method:'DELETE'}).catch(()=>{});
      log('Session terminated'); upRP();
    }

    /* ═══ Tabs ═══ */
    function addTab(id,name){
      const t=document.createElement('div');
      t.className='tab';t.dataset.session=id;
      t.innerHTML=`<span class="tab-dot ${DEV?'demo':'live'}"></span><span>${esc(name)}</span><button class="tab-close">&times;</button>`;
      t.addEventListener('click',e=>e.target.closest('.tab-close')?killSess(id):switchTo(id));
      t.addEventListener('dragover',e=>{e.preventDefault();t.classList.add('drop-target')});
      t.addEventListener('dragleave',()=>t.classList.remove('drop-target'));
      t.addEventListener('drop',e=>{e.preventDefault();t.classList.remove('drop-target');const sk=e.dataTransfer.getData('text/plain');if(sk)fire(id,sk)});
      $('tab-list').appendChild(t);
    }

    async function fire(sid,name){
      if(DEV){const s=sess.get(sid);if(s)s.term.write(`\r\n\x1b[38;2;0;229;255m>\x1b[0m /${name}\r\n\x1b[38;2;58;63;85mExecuting...\x1b[0m\r\n`);log(`Fired <b>/${esc(name)}</b>`);toast(`/${name}`);return;}
      try{await api(`/api/sessions/${sid}/skill`,{method:'POST',body:{skill:name}});log(`Fired <b>/${esc(name)}</b>`);toast(`/${name}`);}catch(e){toast(e.message);}
    }

    /* ═══ Skills ═══ */
    const MOCK=[
      {id:'test',name:'test',description:'Universal test-fix loop — tests everything, fixes in parallel.',type:'skill'},
      {id:'full-stack-tester',name:'full-stack-tester',description:'Zero-defect regression — backend API, frontend, Playwright E2E.',type:'skill'},
      {id:'bmad-feature-builder',name:'bmad-feature-builder',description:'Spec-driven feature builder with PM/Architect/Developer personas.',type:'skill'},
      {id:'frontend-design',name:'frontend-design',description:'Distinctive, production-grade frontend interfaces.',type:'skill'},
      {id:'grill-me',name:'grill-me',description:'Relentless interview about a plan until shared understanding.',type:'skill'},
      {id:'humanizer',name:'humanizer',description:'Remove AI writing patterns from text.',type:'skill'},
      {id:'configure-opus-bots',name:'configure-opus-bots',description:'Configure OpenClaw bots — openclaw.json, workspace, deployment.',type:'skill'},
      {id:'app-builder-e2e',name:'app-builder-e2e',description:'End-to-end test of the Seafin App Builder.',type:'skill'},
      {id:'mobile-first-design',name:'mobile-first-design',description:'Responsive design from mobile screens up.',type:'skill'},
      {id:'cmd-research',name:'research',description:'Structured research with tool routing.',type:'command'},
      {id:'cmd-polish',name:'polish',description:'Final quality pass — alignment, spacing, consistency.',type:'command'},
      {id:'cmd-audit',name:'audit',description:'Audit accessibility, performance, theming.',type:'command'},
      {id:'cmd-animate',name:'animate',description:'Purposeful animations and micro-interactions.',type:'command'},
      {id:'cmd-optimize',name:'optimize',description:'Performance — loading, rendering, bundle size.',type:'command'},
      {id:'cmd-harden',name:'harden',description:'Error handling, i18n, edge cases.',type:'command'},
      {id:'cmd-simplify',name:'simplify',description:'Strip to essence — remove complexity.',type:'command'},
      {id:'cmd-critique',name:'critique',description:'UX design evaluation.',type:'command'},
    ];

    async function loadSkills(){
      allSkills=DEV?MOCK:await api('/api/skills').catch(()=>[]);
      renderSk();
    }

    function renderSk(q=''){
      const f=q.toLowerCase();
      const sk=allSkills.filter(s=>s.type==='skill'&&(!f||s.name.includes(f)||(s.description||'').toLowerCase().includes(f)));
      const cm=allSkills.filter(s=>s.type==='command'&&(!f||s.name.includes(f)||(s.description||'').toLowerCase().includes(f)));

      $('sk-skills').innerHTML=sk.map(s=>`<div class="sk" draggable="true" data-skill="${esc(s.name)}" data-type="skill" data-desc="${esc(s.description||'')}"><span class="sk-wire w1"></span><span class="sk-name">${esc(s.name)}</span><span class="sk-tag">drag</span></div>`).join('');
      $('sk-cmds').innerHTML=cm.map(s=>`<div class="sk" draggable="true" data-skill="${esc(s.name)}" data-type="command" data-desc="${esc(s.description||'')}"><span class="sk-wire w3"></span><span class="sk-name">${esc(s.name)}</span><span class="sk-tag">drag</span></div>`).join('');

      document.querySelectorAll('.sk').forEach(el=>{
        el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',el.dataset.skill);el.classList.add('dragging')});
        el.addEventListener('dragend',()=>el.classList.remove('dragging'));
        el.addEventListener('dblclick',()=>{if(activeId)fire(activeId,el.dataset.skill)});
        el.addEventListener('click',()=>{
          $('rp-skn').textContent=el.dataset.skill;
          const b=$('rp-skt');b.textContent=el.dataset.type;b.className='skd-type '+el.dataset.type;
          $('rp-skdesc').textContent=el.dataset.desc;
          $('rp-skd').classList.add('vis');
        });
      });
    }

    /* ═══ Crons ═══ */
    async function loadCrons(){
      cronJobs=DEV?[
        {id:'c1',name:'nightly-tests',skill:'full-stack-tester',schedule:'0 2 * * *'},
        {id:'c2',name:'weekly-audit',skill:'audit',schedule:'0 9 * * 1'}
      ]:await api('/api/crons').catch(()=>[]);
      renderCr();
    }

    function renderCr(){
      $('sk-crons').innerHTML=cronJobs.length?cronJobs.map(c=>`<div class="cron"><div class="cron-top"><span class="cron-name">${esc(c.name)}</span><button class="cron-x" onclick="delCr('${esc(c.id)}')">&times;</button></div><div class="cron-sched">${esc(c.schedule)}</div><div class="cron-skill">/${esc(c.skill)}</div></div>`).join(''):'<div style="font-size:9px;color:var(--tx3);padding:4px 7px">NO JOBS</div>';
    }

    async function mkCr(d){
      if(DEV){cronJobs.push({id:'c'+Date.now(),...d});renderCr();toast(`Scheduled /${d.skill}`);return;}
      try{await api('/api/crons',{method:'POST',body:d});toast(`Scheduled /${d.skill}`);loadCrons();}catch(e){toast(e.message);}
    }
    async function delCr(id){
      if(DEV){cronJobs=cronJobs.filter(c=>c.id!==id);renderCr();return;}
      try{await api(`/api/crons/${id}`,{method:'DELETE'});loadCrons();}catch(e){toast(e.message);}
    }

    /* ═══ Right Panel ═══ */
    function upRP(){
      const s=activeId?sess.get(activeId):null;
      $('rp-sn').textContent=s?s.name:'—';
      $('rp-sd').textContent=s?s.dir:'—'; $('rp-sd').title=s?s.dir:'';
      $('rp-ss').textContent=s?(DEV?'demo':'live'):'idle';
      $('rp-dot').style.background=s?(DEV?'var(--w4)':'var(--w3)'):'var(--tx3)';
      $('rp-sc').textContent=sess.size;
      if(DEV){
        $('sys-cpu').textContent='8%';$('sys-cpu-b').style.width='8%';
        $('sys-mem').textContent='1.1/4GB';$('sys-mem-b').style.width='28%';
        $('sys-disk').textContent='12/40GB';$('sys-disk-b').style.width='30%';
      }
    }

    function log(msg){
      const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      activity.unshift({t,msg}); if(activity.length>30)activity.length=30;
      $('rp-af').innerHTML=activity.map(a=>`<div class="af-i"><span class="af-t">${a.t}</span><span class="af-m">${a.msg}</span></div>`).join('');
    }

    /* ═══ Auth ═══ */
    async function checkAuth(){
      if(DEV){currentUser={sub:'dev-user',avatar:null};showApp();return;}
      try{currentUser=await api('/auth/me');showApp();}catch(e){showLogin();}
    }
    function showLogin(){$('login').style.display='flex';$('app').style.display='none';}
    function showApp(){
      $('login').style.display='none';$('app').style.display='grid';
      if(currentUser)$('hd-user').innerHTML=`${currentUser.avatar?`<img class="hd-avatar" src="${esc(currentUser.avatar)}">`:''}
        <span class="hd-name">${esc(currentUser.sub)}</span>
        <button class="hd-out" onclick="fetch('/auth/logout',{method:'POST'}).then(()=>location.reload())">LOGOUT</button>`;
      loadSkills();loadCrons();loadSessions();
    }

    async function loadSessions(){
      if(DEV){demo('clawdbot');demo('seafin-hq');log('System online');upRP();return;}
      try{const l=await api('/api/sessions');l.forEach(s=>mkTerm(s.id||s.name,s.name,s.directory));}catch(e){}
    }

    function demo(name){
      const{term}=mkTerm(name,name);
      setTimeout(()=>{
        const s=sess.get(name);if(s)s.fit.fit();
        const L=[
          `\x1b[38;2;58;63;85m┌${'─'.repeat(45)}┐\x1b[0m`,
          `\x1b[38;2;58;63;85m│\x1b[0m  \x1b[38;2;0;229;255mCLAUDE TERMINAL\x1b[0m \x1b[38;2;58;63;85m// ${name}${' '.repeat(Math.max(0,22-name.length))}│\x1b[0m`,
          `\x1b[38;2;58;63;85m└${'─'.repeat(45)}┘\x1b[0m`,
          '',
          `\x1b[38;2;57;255;20m$\x1b[0m claude \x1b[38;2;58;63;85m--project ~/projects/${name}\x1b[0m`,
          '',
          `\x1b[38;2;0;229;255m◆\x1b[0m \x1b[1mClaude Code\x1b[0m`,
          '',
          `  \x1b[38;2;58;63;85mSession\x1b[0m   ${name}`,
          `  \x1b[38;2;58;63;85mModel\x1b[0m     claude-opus-4-6`,
          `  \x1b[38;2;58;63;85mSkills\x1b[0m    ${allSkills.filter(s=>s.type==='skill').length} loaded`,
          `  \x1b[38;2;58;63;85mWires\x1b[0m     \x1b[38;2;0;229;255m━\x1b[0m \x1b[38;2;255;45;120m━\x1b[0m \x1b[38;2;57;255;20m━\x1b[0m \x1b[38;2;255;179;0m━\x1b[0m`,
          '',
          `  \x1b[38;2;58;63;85mDrag skills from sidebar │ Quick actions on right →\x1b[0m`,
          '',
          `\x1b[38;2;0;229;255m>\x1b[0m \x1b[5m█\x1b[0m`,
        ];
        L.forEach((l,i)=>setTimeout(()=>term.writeln(l),i*30));
      },150);
    }

    /* ═══ Util ═══ */
    function $(id){return document.getElementById(id)}
    function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
    function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)}
    function openMo(id){$(id).classList.add('open')}
    function closeMo(id){$(id).classList.remove('open')}

    /* ═══ Events ═══ */
    // Project picker
    async function loadProjects() {
      const sel=$('i-proj');
      sel.innerHTML='<option value="">Select a project...</option>';
      if(DEV){['loop','clawdbot','seafin-hq'].forEach(n=>{const o=document.createElement('option');o.value='/home/claude/projects/'+n;o.textContent=n;sel.appendChild(o)});return;}
      try{const ps=await api('/api/projects');ps.forEach(p=>{const o=document.createElement('option');o.value=p.path;o.textContent=p.name;sel.appendChild(o)});}catch(e){}
    }
    $('i-proj').addEventListener('change',e=>{
      const v=e.target.value;
      if(v){$('i-sd').value=v;const name=v.split('/').pop();$('i-sn').value=name;}
    });
    $('btn-clone').addEventListener('click',async()=>{
      const repo=$('i-clone').value.trim();
      if(!repo){toast('Enter owner/repo');return;}
      toast('Cloning...');
      try{
        const r=await api('/api/projects/clone',{method:'POST',body:{repo}});
        toast(`Cloned ${r.name}`);
        $('i-sd').value=r.path;$('i-sn').value=r.name;
        loadProjects();
      }catch(e){toast(e.message);}
    });

    $('btn-tab').addEventListener('click',()=>{loadProjects();openMo('mo-session')});
    $('btn-cron').addEventListener('click',()=>openMo('mo-cron'));
    $('sk-search').addEventListener('input',e=>renderSk(e.target.value));

    document.querySelectorAll('.sb-head[data-toggle]').forEach(h=>{
      h.addEventListener('click',()=>{h.classList.toggle('shut');const g=$(h.dataset.toggle);if(g)g.classList.toggle('shut')});
    });

    document.querySelectorAll('.qa button').forEach(b=>{
      b.addEventListener('click',()=>{if(activeId)fire(activeId,b.dataset.action)});
    });

    const cz=$('cron-zone');
    cz.addEventListener('dragover',e=>{e.preventDefault();cz.classList.add('over')});
    cz.addEventListener('dragleave',()=>cz.classList.remove('over'));
    cz.addEventListener('drop',e=>{e.preventDefault();cz.classList.remove('over');const sk=e.dataTransfer.getData('text/plain');if(sk){$('i-cs').value=sk;$('i-cn').value=sk+'-job';openMo('mo-cron')}});

    $('tw').addEventListener('dragover',e=>e.preventDefault());
    $('tw').addEventListener('drop',e=>{e.preventDefault();const sk=e.dataTransfer.getData('text/plain');if(sk&&activeId)fire(activeId,sk)});

    $('f-session').addEventListener('submit',async e=>{
      e.preventDefault();closeMo('mo-session');
      const name=$('i-sn').value.trim(),dir=$('i-sd').value.trim();
      if(DEV){demo(name);return;}
      try{const s=await api('/api/sessions',{method:'POST',body:{name,directory:dir}});mkTerm(s.id||name,name,dir);toast(`"${name}" init`)}catch(e){toast(e.message)}
    });

    $('f-cron').addEventListener('submit',async e=>{
      e.preventDefault();closeMo('mo-cron');
      await mkCr({name:$('i-cn').value.trim(),skill:$('i-cs').value.trim(),schedule:$('i-cc').value.trim(),directory:$('i-cd').value.trim()});
    });

    document.querySelectorAll('.mo').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));

    document.addEventListener('keydown',e=>{
      if(e.ctrlKey&&e.key==='t'){e.preventDefault();openMo('mo-session')}
      if(e.key==='Escape')document.querySelectorAll('.mo.open').forEach(m=>m.classList.remove('open'));
      if(e.ctrlKey&&e.key==='w'&&activeId){e.preventDefault();killSess(activeId)}
      if(e.ctrlKey&&e.key==='Tab'){e.preventDefault();const ids=[...sess.keys()];if(ids.length<2)return;switchTo(ids[(ids.indexOf(activeId)+(e.shiftKey?-1:1)+ids.length)%ids.length])}
    });

    /* ═══ Boot ═══ */
    new Net($('cv'));
    checkAuth();
  </script>
</body>
</html>
